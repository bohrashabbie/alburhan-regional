server {
    server_name alburhan-regional.com www.alburhan-regional.com;

    client_max_body_size 50M;

    # ---------- Frontend (Next.js) ----------
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ---------- CMS Backend API ----------
    # No trailing slash on proxy_pass: pass full URI /api/... to FastAPI (it mounts routes at /api/...).
    # With proxy_pass ...8002/ nginx would strip /api/ and upstream would get /auth/login -> 404.
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---------- Admin Panel (Angular SPA on nginx) ----------
    location /admin/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        proxy_set_header Accept-Encoding "";
        proxy_redirect ~^/(.*)$ /admin/$1;
        proxy_redirect / /admin/;

        sub_filter_once off;
        sub_filter_types text/css application/javascript application/json;
        sub_filter 'href="/'   'href="/admin/';
        sub_filter 'src="/'    'src="/admin/';
        sub_filter 'action="/' 'action="/admin/';
        sub_filter 'url(/'     'url(/admin/';
    }

    # ---------- Email Service (FastAPI app) ----------
    location /email/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        proxy_set_header Accept-Encoding "";
        proxy_redirect ~^/(.*)$ /email/$1;
        proxy_redirect / /email/;

        sub_filter_once off;
        sub_filter_types text/css application/javascript application/json;
        sub_filter 'href="/'   'href="/email/';
        sub_filter 'src="/'    'src="/email/';
        sub_filter 'action="/' 'action="/email/';
        sub_filter 'url(/'     'url(/email/';
    }

    # ---------- SSL (managed by Certbot) ----------
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/alburhan-regional.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alburhan-regional.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.alburhan-regional.com) {
        return 301 https://$host$request_uri;
    }
    if ($host = alburhan-regional.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name alburhan-regional.com www.alburhan-regional.com;
    return 404;
}
